[pytest]
# Pytest configuration for Company Data Enrichment System

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    --cov=modules
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70

# Markers
markers =
    unit: Pure unit tests (no I/O)
    integration: Tests requiring file I/O or network
    slow: Tests that take > 1 second

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
